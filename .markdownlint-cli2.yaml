ignores:
  - ".direnv/**"
  - "node_modules/**"

config:
  MD013:
    line_length: 160
    heading_line_length: 80
    code_block_line_length: 80
    tables: true
    strict: true

  # Table column style — use compact (single space around content, no padding)
  MD060:
    style: "compact"

  # Allow duplicate headings in different sections (standard for changelogs)
  MD024:
    siblings_only: true

# Per-file overrides
overrides:
  - files:
      - "CHANGELOG.md"
    config:
      # release-please generates long lines with PR links
      MD013: false
      # release-please generates double blank lines between version header and section
      MD012: false
